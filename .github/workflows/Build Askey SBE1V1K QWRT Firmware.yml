name: Build Askey SBE1V1K 6.18 Firmware

on:
  workflow_dispatch:

jobs:
  build_618:
    runs-on: ubuntu-22.04

    steps:
      - name: Free Disk Space (Maximize Ubuntu Runner Storage)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/libexec/docker /usr/share/swift /usr/local/share/powershell 2>/dev/null || true
          sudo apt-get remove -y google-chrome-stable microsoft-edge-stable firefox mono-devel mssql-tools azure-cli 2>/dev/null || true
          sudo apt-get autoremove -y 2>/dev/null || true
          sudo apt-get clean
          df -h

      # 👑【官方安全通行證】解鎖拉取
      - name: Checkout sbe1v1k branch (Genuine Secure Flow)
        uses: actions/checkout@v4
        with:
          repository: 'cool26-2026/openwrt'
          ref: 'sbe1v1k'
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          git config --global --add safe.directory '*'

      - name: Install System Dependencies
        run: |
          sudo apt-get update --fix-missing || true
          sudo apt-get install -y --fix-missing build-essential ccache file flex g++ gawk gcc gettext git libncurses-dev libssl-dev python3-dev rsync swig u-boot-tools unzip wget zstd binutils bzip2 libbz2-dev perl-modules libglib2.0-dev intltool sharutils patch automake libtool || true

      # 👑【PR 21586 官方名字正位強灌補丁】
      # 保持 6.18 公版架構完好，將您提供、自帶 0x42080000 皇家地址的 sbe1v1k.txt，
      # 以 PR #21586 欽定的官方唯一真身檔名 qcom-ipq9574-askey-sbe1v1k.dts 進行暴力覆蓋！
      # 同時在後台全面封鎖閹割 6devices_kiwi 的殘疾假配置，徹底防搶佔！
      - name: Inject PR 21586 Real DTS File
        run: |
          echo "==> 正在精確強灌 PR 21586 官方標準真身設備樹..."
          wget -qO- https://github.com > /tmp/askey_true.dts
          
          # 【皇家正位打靶】精確尋找並覆蓋 6.18 核心名冊肚子裡真正的 Askey dts 肉體
          find . -type f -name "*askey-sbe1v1k*.dts" -exec cp -v /tmp/askey_true.dts {} \; 2>/dev/null || true
          find . -type f -name "*askey_sbe1v1k*.dts" -exec cp -v /tmp/askey_true.dts {} \; 2>/dev/null || true
          echo "✅ 官方真身名冊已 100% 精確對齊焊死！"

      - name: Update and Install Feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 👑【PR 21586 皇家 6.18 正規軍設定檔】強制寫入唯一指定 Askey 真配置，手動禁用 kiwi
      - name: Configure 6.18 Askey Profile
        run: |
          echo "==> Generating .config for Askey SBE1V1K 6.18..."
          cat > .config << 'EOF'
          CONFIG_TARGET_qualcommbe=y
          CONFIG_TARGET_qualcommbe_ipq95xx=y
          
          # 💎【核心絕殺鋼印】唯獨且強行開啟 PR 21586 認證的唯一真身配置
          CONFIG_TARGET_qualcommbe_ipq95xx_DEVICE_qcom-ipq9574-askey-sbe1v1k=y
          CONFIG_TARGET_qualcommbe_ipq95xx_DEVICE_askey_sbe1v1k=y
          
          # 🛑【手動閹割 Kiwi 內鬼】強制在編譯名冊裡把 kiwi 寫死為 n，不給它任何搶佔排位的機會！
          CONFIG_TARGET_qualcommbe_ipq95xx_DEVICE_8devices_kiwi=n
          CONFIG_TARGET_DEVICE_qualcommbe_ipq95xx_DEVICE_8devices_kiwi=n
          
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_PACKAGE_uhttpd=y
          CONFIG_PACKAGE_uhttpd-mod-ubus=y
          
          CONFIG_AUTOREBUILD=n
          CONFIG_SIGNATURE_CHECK=n
          CONFIG_SIGNED_PACKAGES=n
          CONFIG_KERNEL_DEBUG_INFO=n
          CONFIG_KERNEL_DEBUG_INFO_REDUCED=n
          EOF
          make defconfig

      - name: Download sources and packages
        run: |
          make download -j$(nproc) V=s
        continue-on-error: true

      - name: Compile and Package Firmware (Strict Mode)
        run: |
          export FORCE_UNSAFE_CONFIGURE=1
          export HOST_CFLAGS="-w -Wno-error"
          export HOST_CXXFLAGS="-w -Wno-error"
          export TARGET_CFLAGS="-w -Wno-error"
          export TARGET_CXXFLAGS="-w -Wno-error"
          make -j$(nproc) V=s

      # 👑【全路徑地毯式發貨打撈】
      - name: Hard Copy Real Large Askey Firmware Binaries
        run: |
          mkdir -p /home/runner/askey_618_output
          find bin/targets/ -type f -name "*askey*" -exec cp -v {} /home/runner/askey_618_output/ \; 2>/dev/null || true
          find bin/targets/ -type f -name "*initramfs*" -exec cp -v {} /home/runner/askey_618_output/ \; 2>/dev/null || true
          echo "==> 完美的 Askey 6.18 PR 21586 實體發貨艙名冊清單如下："
          ls -lh /home/runner/askey_618_output/

      - name: Upload Finished 6.18 Firmware Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Askey_SBE1V1K_True_6.18_PR21586_Firmware
          path: /home/runner/askey_618_output/
