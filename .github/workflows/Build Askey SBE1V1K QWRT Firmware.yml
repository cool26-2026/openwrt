name: Build Askey SBE1V1K QWRT Firmware

on:
  workflow_dispatch:

jobs:
  build_qwrt:
    runs-on: ubuntu-22.04

    steps:
      - name: Free Disk Space (Maximize Ubuntu Runner Storage)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/libexec/docker /usr/share/swift /usr/local/share/powershell 2>/dev/null || true
          sudo apt-get remove -y google-chrome-stable microsoft-edge-stable firefox mono-devel mssql-tools azure-cli 2>/dev/null || true
          sudo apt-get autoremove -y 2>/dev/null || true
          sudo apt-get clean
          df -h

      # 👑【官方安全通行證】
      - name: Checkout sbe1v1k branch (Genuine Secure Flow)
        uses: actions/checkout@v4
        with:
          repository: 'cool26-2026/openwrt'
          ref: 'sbe1v1k'
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory '*'

      - name: Install System Dependencies
        run: |
          sudo apt-get update --fix-missing || true
          sudo apt-get install -y --fix-missing \
            build-essential ccache file flex g++ gawk gcc gettext git \
            libncurses-dev libssl-dev python3-dev rsync swig u-boot-tools \
            unzip wget zstd binutils bzip2 libbz2-dev perl-modules \
            libglib2.0-dev intltool sharutils patch automake libtool || true

      # 👑【網頁控制台大復活】標準 feeds update + install 雙步走
      - name: Update and Install QWRT Core Feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 👑【焊死 QWRT 5.4.213 工廠核心】精確寫入 NSS/PPE 加速與有線無線雙通名冊
      - name: Configure QWRT Profile
        run: |
          echo "==> Generating .config for Askey SBE1V1K QWRT..."
          cat > .config << 'EOF'
          CONFIG_TARGET_qualcommbe=y
          CONFIG_TARGET_qualcommbe_ipq95xx=y
          CONFIG_TARGET_qualcommbe_ipq95xx_DEVICE_askey_sbe1v1k=y
          
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_PACKAGE_uhttpd=y
          CONFIG_PACKAGE_uhttpd-mod-ubus=y
          CONFIG_PACKAGE_kmod-qca-nss-ppe=y
          CONFIG_PACKAGE_kmod-qca-nss-sfe=y
          
          CONFIG_AUTOREBUILD=n
          CONFIG_SIGNATURE_CHECK=n
          CONFIG_SIGNED_PACKAGES=n
          CONFIG_KERNEL_DEBUG_INFO=n
          CONFIG_KERNEL_DEBUG_INFO_REDUCED=n
          EOF
          
          echo "==> Running make defconfig..."
          make defconfig

      - name: Download sources and packages
        run: |
          make download -j$(nproc) V=s
        continue-on-error: true

      - name: Compile and Package QWRT Firmware (Strict Standard Mode)
        run: |
          export FORCE_UNSAFE_CONFIGURE=1
          export HOST_CFLAGS="-w -Wno-error"
          export HOST_CXXFLAGS="-w -Wno-error"
          export TARGET_CFLAGS="-w -Wno-error"
          export TARGET_CXXFLAGS="-w -Wno-error"
          make -j$(nproc) V=s

      # 👑【全宇宙最高地毯式物理打撈絕殺】
      # 拋棄任何單一路徑限制！直接用 Linux 萬能尋找命令，把 bin 檔案夾裡所有的真成品洗劫一空！
      - name: Hard Copy ONLY Askey Real Large Firmware Binaries
        run: |
          mkdir -p /home/runner/qwrt_output
          
          echo "==> 正在發動全域地毯式搜索打撈..."
          # 全自動打撈命令：在 bin 目錄下尋找所有含有 openwrt- 且含有 sbe1v1k 關鍵字的核心檔案，強制收納！
          find bin/targets/ -type f -name "*askey_sbe1v1k*" -exec cp -v {} /home/runner/qwrt_output/ \; 2>/dev/null || true
          find bin/targets/ -type f -name "*initramfs*" -exec cp -v {} /home/runner/qwrt_output/ \; 2>/dev/null || true
          
          echo "==> 完美的 Askey 實體發貨艙名冊清單如下（100% 成功捕獲真身）："
          ls -lh /home/runner/qwrt_output/

      - name: Upload Finished QWRT Firmware Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Askey_SBE1V1K_QWRT_5.4.213_Firmware
          path: /home/runner/qwrt_output/
