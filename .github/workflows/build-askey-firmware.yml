name: Build Askey SBE1V1K Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Free Disk Space (Maximize Ubuntu Runner Storage)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/libexec/docker /usr/share/swift /usr/local/share/powershell 2>/dev/null || true
          sudo apt-get remove -y google-chrome-stable microsoft-edge-stable firefox mono-devel mssql-tools azure-cli 2>/dev/null || true
          sudo apt-get autoremove -y 2>/dev/null || true
          sudo apt-get clean
          echo "==> Current Free Space after Mega Cleanup:"
          df -h

      - name: Force Clean Checkout Andrew Genuine Branch
        run: |
          # 【最高核心絕殺】物理清除當前所有被 main 合併污染的殘留，從零拉取 Andrew 最純淨的 sbe1v1k 核心！
          rm -rf * .git
          git clone -b sbe1v1k https://github.com .
          git config --global --add safe.directory '*'

      - name: Install System Dependencies
        run: |
          sudo apt-get update --fix-missing || true
          sudo apt-get install -y --fix-missing build-essential ccache file flex g++ gawk gcc gettext git libncurses-dev libssl-dev python3-dev rsync swig u-boot-tools unzip wget zstd binutils bzip2 subversion diffutils which bison m4 patch jq ecj fastjar qemu-utils quilt lzma libtool libglib2.0-dev libelf-dev e2fsprogs-extra libattr1-dev libcap-dev libmpc-dev libmpfr-dev libgmp-dev libz-dev pigz libzstd-dev squashfs-tools device-tree-compiler gcc-multilib g++-multilib libc6-dev-i386 lib32readline-dev || true

      - name: Install Feeds
        run: |
          ./scripts/feeds install -a

      - name: Configure Askey Profile
        run: |
          # 精確選定最正統的萬兆 6.18 型號名冊
          echo "CONFIG_TARGET_qualcommbe=y" > .config
          echo "CONFIG_TARGET_qualcommbe_ipq95xx=y" >> .config
          echo "CONFIG_TARGET_qualcommbe_ipq95xx_DEVICE_askey_sbe1v1k=y" >> .config
          echo "CONFIG_PACKAGE_luci=y" >> .config
          
          echo "CONFIG_AUTOREBUILD=n" >> .config
          echo "CONFIG_SIGNATURE_CHECK=n" >> .config
          echo "CONFIG_SIGNED_PACKAGES=n" >> .config
          echo "CONFIG_KERNEL_DEBUG_INFO=n" >> .config
          echo "CONFIG_KERNEL_DEBUG_INFO_REDUCED=n" >> .config
          make defconfig

      - name: Apply Universal Patch and Force Tools Reset
        run: |
          mkdir -p staging_dir/host
          touch staging_dir/host/.prereq-build
          rm -rf staging_dir/host/bin/m4 staging_dir/host/bin/bison staging_dir/host/bin/quilt staging_dir/host/bin/sed staging_dir/host/bin/mmp 2>/dev/null || true
          
          mkdir -p staging_dir/hostpkg/bin staging_dir/hostpkg/stamp
          
          find . -type f \( -name "Makefile" -o -name "*.mk" -o -name "Kbuild" -o -name "*.rules" -o -name "Config.in" \) -exec sed -i 's/-Werror//gI' {} + 2>/dev/null
          find . -type f \( -name "Makefile" -o -name "*.mk" -o -name "Kbuild" -o -name "*.rules" -o -name "Config.in" \) -exec sed -i 's/-Werror=all//gI' {} + 2>/dev/null
          
          # 【對齊官方萬兆 6.18 內核鋼印】
          echo "KERNEL_BUILD_DIR:=6.18.35-1" >> include/kernel.mk
          echo "LINUX_VERSION:=6.18.35" >> include/kernel.mk
          
          sed -i 's/tools-y += gnulib/# tools-y += gnulib/g' tools/Makefile 2>/dev/null
          find ./include ./scripts ./package -type f \( -name "*.mk" -o -name "*.sh" -o -name "Makefile" \) -exec sed -i 's/\~/./g' {} + 2>/dev/null

      - name: Compile and Package Firmware
        run: |
          export FORCE_UNSAFE_CONFIGURE=1
          export HOST_CFLAGS="-w -Wno-error -Wno-implicit-function-declaration"
          export HOST_CXXFLAGS="-w -Wno-error"
          export TARGET_CFLAGS="-w -Wno-error -Wno-implicit-function-declaration"
          export TARGET_CXXFLAGS="-w -Wno-error"
          export EXTRA_CFLAGS="-w -Wno-error -Wno-implicit-function-declaration"
          export KBUILD_CFLAGS="-w -Wno-error -Wno-implicit-function-declaration"
          export CFLAGS="-w -Wno-error"
          export CXXFLAGS="-w -Wno-error"
          
          make -j$(nproc) V=s CONFIG_AUTOREBUILD=n -i || true

      - name: Hard Copy Real Large Firmware Binaries
        run: |
          # 【貨艙精確直連】物理抄底真正由 6.18 內核打包出的 openwrt 安裝大包！
          mkdir -p /home/runner/askey_output
          cp -v bin/targets/qualcommbe/ipq95xx/openwrt-* /home/runner/askey_output/ 2>/dev/null || true
          echo "==> Checked Real Files in Output Cargo:"
          ls -lh /home/runner/askey_output/

      - name: Upload Finished Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Askey_SBE1V1K_6.18_Genuine_Firmware
          path: /home/runner/askey_output/
