name: Build Askey SBE1V1K Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Free Disk Space (Maximize Ubuntu Runner Storage)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/libexec/docker /usr/share/swift /usr/local/share/powershell 2>/dev/null || true
          sudo apt-get remove -y google-chrome-stable microsoft-edge-stable firefox mono-devel mssql-tools azure-cli 2>/dev/null || true
          sudo apt-get autoremove -y 2>/dev/null || true
          sudo apt-get clean
          echo "==> Current Free Space after Mega Cleanup:"
          df -h

      - name: Checkout sbe1v1k branch
        uses: actions/checkout@v4
        with:
          ref: sbe1v1k
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory '*'

      - name: Sync upstream main branch
        run: |
          git remote add upstream https://github.com/openwrt/openwrt.git || true
          git fetch upstream main
          echo "==> Merging upstream/main..."
          git merge --no-edit upstream/main || git merge --abort
        continue-on-error: true

      - name: Install System Dependencies
        run: |
          sudo apt-get update --fix-missing || true
          sudo apt-get install -y --fix-missing \
            build-essential ccache file flex g++ gawk gcc gettext git \
            libncurses-dev libssl-dev python3-dev rsync swig u-boot-tools \
            unzip wget zstd binutils bzip2 libbz2-dev perl-modules \
            libglib2.0-dev intltool sharutils patch automake libtool

      - name: Update and Install Feeds
        run: |
          echo "==> Updating feeds..."
          ./scripts/feeds update -a
          echo "==> Installing feeds..."
          ./scripts/feeds install -a

      - name: Configure Askey SBE1V1K Profile
        run: |
          echo "==> Generating .config for Askey SBE1V1K..."
          cat > .config << 'EOF'
          CONFIG_TARGET_qualcommbe=y
          CONFIG_TARGET_qualcommbe_ipq95xx=y
          CONFIG_TARGET_qualcommbe_ipq95xx_DEVICE_askey_sbe1v1k=y
          CONFIG_PACKAGE_luci=y
          CONFIG_AUTOREBUILD=n
          CONFIG_SIGNATURE_CHECK=n
          CONFIG_SIGNED_PACKAGES=n
          CONFIG_KERNEL_DEBUG_INFO=n
          CONFIG_KERNEL_DEBUG_INFO_REDUCED=n
          EOF
          
          echo "==> Running make defconfig..."
          make defconfig
          
          echo "==> Generated .config:"
          grep "CONFIG_TARGET\|CONFIG_DEVICE" .config

      - name: Download sources and packages
        run: |
          echo "==> Downloading sources..."
          make download -j$(nproc) V=s
        continue-on-error: true

      - name: Compile and Package Firmware
        run: |
          echo "==> Starting firmware compilation..."
          export FORCE_UNSAFE_CONFIGURE=1
          export HOST_CFLAGS="-w -Wno-error"
          export HOST_CXXFLAGS="-w -Wno-error"
          export TARGET_CFLAGS="-w -Wno-error"
          export TARGET_CXXFLAGS="-w -Wno-error"
          
          # Do NOT use -i flag - we need to fail on errors
          make -j$(nproc) V=s 2>&1 | tee build.log
          
          if [ $? -eq 0 ]; then
            echo "✅ Compilation succeeded"
          else
            echo "❌ Compilation failed"
            exit 1
          fi

      - name: Check Build Results
        run: |
          echo "==> Checking for compiled firmware..."
          if [ -d "bin/targets/qualcommbe/ipq95xx" ]; then
            echo "✅ Output directory found"
            echo "==> Firmware files:"
            ls -lh bin/targets/qualcommbe/ipq95xx/
            
            echo ""
            echo "==> File details:"
            file bin/targets/qualcommbe/ipq95xx/*
            
            echo ""
            echo "==> Checking firmware integrity:"
            for f in bin/targets/qualcommbe/ipq95xx/*; do
              if [ -f "$f" ]; then
                size=$(stat -f%z "$f" 2>/dev/null || stat -c%s "$f" 2>/dev/null)
                echo "  $f (size: $size bytes)"
              fi
            done
          else
            echo "❌ Output directory not found!"
            echo "==> Build log (last 200 lines):"
            tail -200 build.log
            exit 1
          fi

      - name: Save Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_id }}
          path: build.log
          retention-days: 30

      - name: Upload Firmware Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Askey_SBE1V1K_Firmware_${{ github.run_id }}
          path: bin/targets/qualcommbe/ipq95xx/
          retention-days: 30

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: bin/targets/qualcommbe/ipq95xx/*
          tag_name: sbe1v1k-build-${{ github.run_id }}
          body: |
            # Askey SBE1V1K Firmware Build
            
            **Build Details:**
            - Branch: sbe1v1k
            - Commit: ${{ github.sha }}
            - Build Time: ${{ github.event.head_commit.timestamp }}
            - Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            **Files:**
            - Check the artifacts for compiled firmware images
            
            **Flashing Instructions:**
            1. Download the firmware from artifacts or release
            2. Use your device's web interface or serial console to flash
            3. Wait for the system to boot
            4. If it fails to boot, check the serial console output for errors
            
            **Troubleshooting:**
            - If device fails to boot after flashing, check the build log
            - Compare file sizes with your original firmware
            - Ensure you're using the correct firmware for your device
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
