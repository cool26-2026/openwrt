# 終極修正版：對齊 Linux 6.12 核心，修正檔案打撈路徑
name: Build Askey SBE1V1K Firmware
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with: {repository: 'andrewjlamarche/openwrt', ref: 'sbe1v1k', path: '.'}
      - name: Configure and Patch
        run: |
          # 1. 強制對齊 6.12 內核
          sed -i 's/LINUX_VERSION:=.*/LINUX_VERSION:=6.12.24/g' include/kernel.mk
          # 2. 清理 Makefile 中的 -Werror，解決舊代碼編譯警告死鎖
          find . -type f -name "Makefile" -exec sed -i 's/-Werror//g' {} +
          # 3. 配置 Askey
          echo "CONFIG_TARGET_qualcommbe=y" > .config
          echo "CONFIG_TARGET_qualcommbe_ipq95xx=y" >> .config
          echo "CONFIG_TARGET_qualcommbe_ipq95xx_DEVICE_askey_sbe1v1k=y" >> .config
          make defconfig
      - name: Build
        run: make -j$(nproc) V=s -i || true
      - name: Collect Artifacts
        run: |
          mkdir -p /home/runner/askey_output
          # 4. 精確打撈 >10M 的實體固件，包含 askey 鋼印
          find bin/targets/ -type f -size +10M \( -name "*askey*" -o -name "*sbe1v1k*" \) -exec cp -v {} /home/runner/askey_output/ \;
      - uses: actions/upload-artifact@v4
        with:
          name: Askey_SBE1V1K_Firmware_6.12
          path: /home/runner/askey_output/
