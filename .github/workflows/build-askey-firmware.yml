name: Build Askey SBE1V1K Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Source and Apply 6.18 Patch
        run: |
          git clone -b sbe1v1k https://github.com .
          # 強制設定為官方修正的 askey_sbe1v1k 型號並使用 Linux 6.18
          sed -i 's/LINUX_VERSION:=6.12.*/LINUX_VERSION:=6.18.35/g' include/kernel.mk
          
      - name: Configure and Build
        run: |
          echo "CONFIG_TARGET_qualcommbe=y" > .config
          echo "CONFIG_TARGET_qualcommbe_ipq95xx=y" >> .config
          echo "CONFIG_TARGET_qualcommbe_ipq95xx_DEVICE_askey_sbe1v1k=y" >> .config
          make defconfig
          make -j$(nproc)
          
      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: Askey_SBE1V1K_6.18_Firmware
          path: bin/targets/qualcommbe/ipq95xx/*.itb
