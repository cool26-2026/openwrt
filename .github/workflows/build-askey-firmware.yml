name: Build Askey SBE1V1K Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Andrew Askey Source Code
        uses: actions/checkout@v4
        with:
          repository: 'andrewjlamarche/openwrt'
          ref: 'sbe1v1k'
          path: '.'

      - name: Fix Workspace Permissions and Clean Git Stamps
        run: |
          sudo chown -R runner:docker .
          rm -rf .git/index.lock 2>/dev/null || true
          git config --global --add safe.directory '*'

      - name: Install System Dependencies
        run: |
          sudo apt-get update --fix-missing || true
          sudo apt-get install -y --fix-missing build-essential ccache file flex g++ gawk gcc gettext git libncurses-dev libssl-dev python3-dev rsync swig u-boot-tools unzip wget zstd binutils bzip2 subversion diffutils which bison m4 patch jq ecj fastjar qemu-utils quilt lzma libtool libglib2.0-dev libelf-dev e2fsprogs-extra libattr1-dev libcap-dev libmpc-dev libmpfr-dev libgmp-dev libz-dev pigz libzstd-dev squashfs-tools device-tree-compiler gcc-multilib g++-multilib libc6-dev-i386 lib32readline-dev || true

      - name: Install Feeds
        run: |
          ./scripts/feeds install -a

      - name: Configure Askey Profile
        run: |
          echo "CONFIG_TARGET_qualcommbe=y" > .config
          echo "CONFIG_TARGET_qualcommbe_ipq95xx=y" >> .config
          echo "CONFIG_TARGET_qualcommbe_ipq95xx_DEVICE_askey_sbe1v1k=y" >> .config
          echo "CONFIG_PACKAGE_luci=y" >> .config
          make defconfig

      - name: Apply Universal Patch and Force Tools Reset
        run: |
          # 物理補齊最高放行印章，砸碎 toplevel.mk 的大檢查機制！
          mkdir -p staging_dir/host
          touch staging_dir/host/.prereq-build
          # 物理清除可能干擾 Linux 6.12 內核的所有舊工具快取
          rm -rf staging_dir/host/bin/m4 staging_dir/host/bin/bison staging_dir/host/bin/quilt staging_dir/host/bin/sed staging_dir/host/bin/mmp 2>/dev/null || true
          # 【最高核心絕殺】全域為核心簽名工具強刷忽略警告防震漆，徹底粉碎第 5 分鐘 Exit Code 2 死鎖！
          find tools/ -type f -name "Makefile" -exec sed -i 's/HOST_CFLAGS+=/HOST_CFLAGS+=-Wno-error -Wno-implicit-function-declaration /g' {} + 2>/dev/null
          # 全域強制內核版本號與 APK 封裝引擎純數字對齊
          echo "KERNEL_BUILD_DIR:=6.12.91-1" >> include/kernel.mk
          echo "LINUX_VERSION:=6.12.91" >> include/kernel.mk
          find ./include ./scripts ./package -type f \( -name "*.mk" -o -name "*.sh" -o -name "Makefile" \) -exec sed -i 's/\~/./g' {} + 2>/dev/null
          sed -i 's/tools-y += gnulib/# tools-y += gnulib/g' tools/Makefile 2>/dev/null

      - name: Compile and Package Firmware
        run: |
          export FORCE_UNSAFE_CONFIGURE=1
          # 【全核心火力全開】放行全域最高通道，命令微軟伺服器多核心並行全速大衝刺！
      - name: Compile and Package Firmware
        run: |
          export FORCE_UNSAFE_CONFIGURE=1
          # 【單核心逼供】命令微軟伺服器只用單個核心，抓出最後一個內核衝突檔案！
          make -j1 V=s


      - name: Upload Finished Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Askey_SBE1V1K_Firmware_746d79cb72
          path: bin/targets/qualcommbe/ipq95xx/*sbe1v1k*
