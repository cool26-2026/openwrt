name: Sync Upstream & Build OpenWrt

on:
  workflow_dispatch:  # 手动触发
  schedule:
    - cron: '0 2 * * *'  # 每天 UTC 2:00 自动运行

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync-and-build:
    name: Sync & Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync upstream branch
        run: |
          git remote add upstream https://github.com/openwrt/openwrt.git || true
          git fetch upstream main
          git merge --no-edit upstream/main || git merge --abort
        continue-on-error: true

      - name: Push changes
        run: |
          if [[ -n $(git status -s) ]]; then
            git push origin ${{ github.ref_name }}
            echo "✅ Successfully synced upstream changes"
          else
            echo "✅ Already up to date with upstream"
          fi
        continue-on-error: true

      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses5-dev libssl-dev python3-dev \
            python3-distutils rsync unzip zlib1g-dev file wget

      - name: Update and install feeds
        run: |
          cd ${{ github.workspace }}
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Download sources
        run: |
          cd ${{ github.workspace }}
          make download -j$(nproc) V=sc
        continue-on-error: true

      - name: Build OpenWrt
        run: |
          cd ${{ github.workspace }}
          make -j$(nproc) V=sc 2>&1 | tee build.log
        timeout-minutes: 480

      - name: Check build result
        run: |
          if [ -d "bin/targets" ]; then
            echo "✅ Build successful!"
            ls -lh bin/targets/
          else
            echo "❌ Build failed!"
            tail -100 build.log
            exit 1
          fi

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-build-${{ github.run_id }}
          path: bin/targets/
          retention-days: 30

      - name: Create release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: bin/targets/**/*
          tag_name: build-${{ github.run_id }}-${{ github.run_number }}
          body: |
            OpenWrt build from branch: ${{ github.ref_name }}
            Build time: ${{ github.event.head_commit.timestamp }}
            Commit: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Build failed! Check the logs above for details."
          exit 1
